<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fondamentaux de Linux | Formation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/highlight.min.js"></script>
  <style>
    :root {
      --bg: #07120f;
      --bg-soft: #0d1d18;
      --bg-card: rgba(14, 32, 26, 0.88);
      --bg-code: #020806;
      --grid: rgba(105, 255, 190, 0.07);
      --accent: #54f2a7;
      --accent-2: #60a5fa;
      --accent-3: #fbbf24;
      --accent-danger: #fb7185;
      --text: #ecfdf5;
      --muted: #9eb8ad;
      --dim: #557166;
      --border: rgba(148, 220, 184, 0.18);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: "Source Sans 3", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 500px at 15% 10%, rgba(84, 242, 167, 0.12), transparent),
        radial-gradient(800px 500px at 90% 90%, rgba(96, 165, 250, 0.10), transparent),
        var(--bg);
    }

    .terminal-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(0,0,0,0.35));
    }

    .pulse-line {
      position: fixed;
      left: 0;
      right: 0;
      top: 58px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.5;
      animation: pulse 4s ease-in-out infinite;
      z-index: 5;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.18; transform: translateX(-8%); }
      50% { opacity: 0.75; transform: translateX(8%); }
    }

    .header {
      position: fixed;
      inset: 0 0 auto 0;
      height: 58px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      background: rgba(7, 18, 15, 0.84);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .logo {
      font-family: "JetBrains Mono", monospace;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .day-nav {
      display: flex;
      gap: 8px;
    }

    button {
      font: inherit;
    }

    .day-btn, .ctrl-btn {
      border: 1px solid var(--border);
      background: rgba(13, 29, 24, 0.65);
      color: var(--muted);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    .day-btn {
      padding: 7px 12px;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .ctrl-btn {
      width: 38px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.8rem;
    }

    .ctrl-btn.wide { width: auto; padding: 0 10px; }
    .day-btn:hover, .ctrl-btn:hover { border-color: var(--accent); color: var(--text); transform: translateY(-1px); }
    .day-btn.active, .ctrl-btn.active {
      border-color: rgba(84, 242, 167, 0.75);
      color: var(--accent);
      background: rgba(84, 242, 167, 0.12);
    }
    .ctrl-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .counter {
      min-width: 70px;
      text-align: center;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.78rem;
      color: var(--dim);
    }

    .progress-track {
      position: fixed;
      top: 58px;
      left: 0;
      right: 0;
      height: 3px;
      z-index: 21;
      background: rgba(148, 220, 184, 0.08);
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.3s ease;
    }

    .slides-wrapper {
      position: fixed;
      inset: 61px 0 0 0;
      overflow: hidden;
      z-index: 10;
    }

    .slide {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 48px 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateX(100%);
      pointer-events: none;
      transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s ease;
    }

    .slide.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .slide.prev {
      transform: translateX(-100%);
    }

    .slide-inner {
      width: min(1180px, 100%);
      margin: 0 auto;
    }

    .slide-number {
      font-family: "JetBrains Mono", monospace;
      color: var(--accent);
      opacity: 0.65;
      font-size: 0.78rem;
      margin-bottom: 10px;
    }

    h1, h2, h3, h4, p { margin-top: 0; }

    .slide-title {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(2.2rem, 4.5vw, 4.4rem);
      line-height: 1.04;
      margin-bottom: 22px;
      letter-spacing: -0.04em;
      color: var(--text);
    }

    .slide-title.accent {
      background: linear-gradient(135deg, var(--accent), #d9ffe8 48%, var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .slide-subtitle, p, li, td {
      color: var(--muted);
      font-size: 1.18rem;
      line-height: 1.65;
    }

    .slide-subtitle {
      font-size: clamp(1.2rem, 2vw, 1.55rem);
      max-width: 820px;
      margin-bottom: 28px;
    }

    h3 {
      font-family: "Space Grotesk", sans-serif;
      color: var(--accent);
      font-size: 1.35rem;
      margin: 22px 0 10px;
    }

    h4 {
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.05rem;
      margin: 0 0 8px;
    }

    strong { color: var(--text); font-weight: 700; }
    em { color: var(--accent-3); font-style: normal; }

    ul, ol {
      margin: 12px 0;
      padding-left: 26px;
    }
    li { margin: 7px 0; }
    li::marker { color: var(--accent); }

    code {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.88em;
      color: #c8ffdd;
      background: rgba(84, 242, 167, 0.10);
      padding: 2px 7px;
      border-radius: 6px;
    }

    pre {
      position: relative;
      margin: 18px 0;
      padding: 20px 22px;
      border-radius: 16px;
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      background: var(--bg-code);
      overflow-x: auto;
      box-shadow: var(--shadow);
    }

    pre code {
      display: block;
      padding: 0;
      color: var(--text);
      background: transparent;
      font-size: 0.88rem;
      line-height: 1.7;
    }

    pre::before {
      content: "$ terminal";
      position: absolute;
      top: 8px;
      right: 14px;
      color: var(--dim);
      font-family: "JetBrains Mono", monospace;
      font-size: 0.68rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 18px 0;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(13, 29, 24, 0.55);
    }
    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--accent);
      font-family: "JetBrains Mono", monospace;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    tr:last-child td { border-bottom: 0; }

    .hero { text-align: center; }
    .hero .slide-subtitle { margin-left: auto; margin-right: auto; }

    .two-cols {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 28px;
      align-items: start;
    }

    .three-cols {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      align-items: stretch;
    }

    .card, .info-box {
      border: 1px solid var(--border);
      background: var(--bg-card);
      border-radius: 18px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .card.accent { border-left: 4px solid var(--accent); }
    .card.blue { border-left: 4px solid var(--accent-2); }
    .card.amber { border-left: 4px solid var(--accent-3); }
    .card.danger { border-left: 4px solid var(--accent-danger); }

    .info-box {
      border-left: 4px solid var(--accent);
      margin: 16px 0;
    }
    .info-box.warning { border-left-color: var(--accent-3); }
    .info-box.danger { border-left-color: var(--accent-danger); }
    .info-box.blue { border-left-color: var(--accent-2); }

    .tag-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 20px 0; }
    .tag {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--border);
      color: var(--accent);
      background: rgba(84, 242, 167, 0.09);
      border-radius: 999px;
      padding: 6px 12px;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .diagram {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 24px 0;
    }
    .node {
      min-width: 130px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
      background: rgba(13, 29, 24, 0.72);
      color: var(--text);
      font-weight: 700;
    }
    .node.kernel { border-color: rgba(84, 242, 167, 0.7); box-shadow: 0 0 28px rgba(84, 242, 167, 0.13); }
    .arrow { color: var(--dim); font-family: "JetBrains Mono", monospace; }

    .terminal-card {
      font-family: "JetBrains Mono", monospace;
      border: 1px solid var(--border);
      background: #020806;
      border-radius: 16px;
      padding: 18px 20px;
      color: var(--accent);
      line-height: 1.8;
      box-shadow: var(--shadow);
    }
    .terminal-card .out { color: var(--dim); }

    .speaker-notes, .tp-panel, .assist-panel, .menu {
      position: fixed;
      z-index: 30;
      background: rgba(7, 18, 15, 0.96);
      border: 1px solid var(--border);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .speaker-notes {
      left: 0;
      right: 0;
      bottom: 0;
      height: 190px;
      padding: 18px 24px;
      transform: translateY(100%);
      transition: transform 0.25s ease;
      overflow-y: auto;
    }
    .speaker-notes.visible { transform: translateY(0); }
    .speaker-notes h4 {
      color: var(--accent-3);
      font-family: "JetBrains Mono", monospace;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.78rem;
    }

    .tp-panel {
      top: 61px;
      right: 0;
      bottom: 0;
      width: min(720px, 55vw);
      transform: translateX(100%);
      transition: transform 0.28s ease;
      display: flex;
      flex-direction: column;
    }
    .tp-panel.visible { transform: translateX(0); }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
    }
    .panel-head h3 {
      margin: 0;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.84rem;
    }
    .panel-body {
      overflow-y: auto;
      padding: 18px;
    }
    .panel-body .slide-title { font-size: 2rem; }
    .panel-body p, .panel-body li, .panel-body td { font-size: 1rem; }

    .assist-panel {
      right: 18px;
      bottom: 18px;
      width: 360px;
      padding: 18px;
      border-radius: 16px;
      display: none;
    }
    .assist-panel.visible { display: block; }

    .menu {
      right: 18px;
      top: 70px;
      width: 360px;
      max-height: 70vh;
      overflow-y: auto;
      border-radius: 16px;
      padding: 8px;
      display: none;
    }
    .menu.visible { display: block; }
    .menu-item {
      width: 100%;
      display: flex;
      gap: 10px;
      align-items: center;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      text-align: left;
      padding: 9px 10px;
      cursor: pointer;
    }
    .menu-item:hover, .menu-item.active { background: rgba(84, 242, 167, 0.09); color: var(--text); }
    .menu-num { color: var(--accent); font-family: "JetBrains Mono", monospace; min-width: 46px; }

    .keyboard-hints {
      position: fixed;
      left: 18px;
      bottom: 16px;
      z-index: 15;
      display: flex;
      gap: 10px;
      color: var(--dim);
      font-size: 0.72rem;
    }
    .key {
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 2px 6px;
      font-family: "JetBrains Mono", monospace;
    }

    .slide-img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .image-hero {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 28px;
      margin: 16px 0 6px;
      flex-wrap: wrap;
    }

    .image-hero img {
      max-height: 220px;
      width: auto;
      filter: drop-shadow(0 10px 32px rgba(84, 242, 167, 0.22));
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 22px;
      align-items: end;
      margin: 22px 0 14px;
    }

    .image-grid figure {
      margin: 0;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .image-grid img {
      max-height: 86px;
      width: auto;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.45));
    }

    .image-grid figcaption {
      color: var(--muted);
      font-family: "JetBrains Mono", monospace;
      font-size: 0.74rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .distro-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
      margin: 18px 0 8px;
    }
    .distro-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
      transition: transform 0.18s ease, border-color 0.18s ease;
    }
    .distro-card:hover { transform: translateY(-3px); border-color: var(--accent); }
    .distro-card .distro-logo {
      width: 84px;
      height: 84px;
      background: #ffffff;
      border-radius: 14px;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.45);
    }
    .distro-card .distro-logo img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
    }
    .distro-card .distro-name {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 600;
      color: var(--text);
      font-size: 1rem;
    }
    .distro-card .distro-tag {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.35;
      margin: 0;
    }

    .portrait-card {
      display: flex;
      gap: 22px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 18px;
      padding: 18px 22px;
      box-shadow: var(--shadow);
      margin: 16px 0;
    }

    .portrait-card img {
      width: 170px;
      height: 220px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .portrait-card .portrait-body {
      flex: 1 1 320px;
      min-width: 0;
      color: var(--muted);
    }

    .portrait-card .portrait-body strong { display: block; color: var(--text); margin-bottom: 4px; font-size: 1.05rem; }
    .portrait-card .portrait-body em { color: var(--accent); font-style: normal; font-family: "JetBrains Mono", monospace; font-size: 0.82rem; }

    .image-banner {
      display: block;
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 16px;
      border: 1px solid var(--border);
      margin: 16px 0;
      box-shadow: var(--shadow);
    }

    .icon-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 26px;
      flex-wrap: wrap;
      margin: 10px 0 16px;
      opacity: 0.95;
    }
    .icon-strip img { height: 64px; width: auto; }

    .callout-badge {
      display: inline-block;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid;
      margin-bottom: 14px;
    }
    .callout-badge.demo { color: var(--accent-3); border-color: var(--accent-3); background: rgba(251, 191, 36, 0.10); }
    .callout-badge.exercice { color: var(--accent); border-color: var(--accent); background: rgba(84, 242, 167, 0.10); }
    .callout-badge.qna { color: var(--accent-2); border-color: var(--accent-2); background: rgba(96, 165, 250, 0.10); }

    .slide.demo .slide-inner { border-left: 4px solid var(--accent-3); padding-left: 22px; }
    .slide.demo .slide-title { background: linear-gradient(135deg, var(--accent-3), #ffd45a 60%, var(--accent-3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .slide.exercice .slide-inner { border-left: 4px solid var(--accent); padding-left: 22px; }

    .slide.qna {
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .slide.qna .slide-inner { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .qna-mark {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(8rem, 22vw, 18rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 0.9;
      margin: 0;
      letter-spacing: -0.06em;
    }

    .formateur-card {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
      align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent-2);
      border-radius: 18px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin: 16px 0;
    }
    .formateur-card .formateur-photo {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(13, 29, 24, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "JetBrains Mono", monospace;
      color: var(--dim);
      font-size: 0.8rem;
    }
    .formateur-card .formateur-body strong { display: block; color: var(--text); font-size: 1.4rem; margin-bottom: 6px; font-family: "Space Grotesk", sans-serif; }
    .formateur-card .formateur-body em { color: var(--accent); font-style: normal; font-family: "JetBrains Mono", monospace; font-size: 0.82rem; letter-spacing: 0.06em; }
    .formateur-card .formateur-body p { margin: 8px 0 0; }
    .formateur-card ul { margin: 10px 0 0; }

    @media (max-width: 720px) {
      .formateur-card { grid-template-columns: 1fr; }
    }

    .day-plan {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      margin: 22px 0 12px;
    }

    .plan-step {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px 22px 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .plan-step::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      opacity: 0.85;
    }

    .plan-step .plan-num {
      position: absolute;
      top: 14px;
      right: 16px;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      color: var(--dim);
      text-transform: uppercase;
    }

    .plan-step h4 {
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.1rem;
      color: var(--text);
      margin: 0 0 6px;
    }

    .plan-step .plan-time {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .plan-step p {
      font-size: 1rem;
      line-height: 1.55;
      color: var(--muted);
      margin: 0;
    }

    .plan-step .plan-icon {
      font-family: "JetBrains Mono", monospace;
      color: var(--accent);
      font-size: 1.6rem;
      margin-bottom: 6px;
      display: block;
    }

    @media (max-width: 980px) {
      .header { height: auto; min-height: 58px; align-items: flex-start; padding: 10px 12px; gap: 8px; }
      .brand { flex-direction: column; align-items: flex-start; gap: 8px; }
      .day-nav { flex-wrap: wrap; }
      .controls { flex-wrap: wrap; justify-content: flex-end; }
      .slides-wrapper { top: 104px; }
      .progress-track, .pulse-line { top: 101px; }
      .slide { padding: 28px 22px; }
      .two-cols, .three-cols { grid-template-columns: 1fr; }
      .tp-panel { width: 100vw; max-width: none; top: 104px; }
      .keyboard-hints { display: none; }
    }
  </style>
</head>
<body>
  <div class="terminal-grid"></div>
  <div class="pulse-line"></div>

  <header class="header">
    <div class="brand">
      <div class="logo">LINUX/FONDAMENTAUX</div>
      <nav class="day-nav" id="dayNav"></nav>
    </div>
    <div class="controls">
      <button class="ctrl-btn wide" id="tpBtn" title="Panneau TP (T)" disabled>TP</button>
      <button class="ctrl-btn" id="assistBtn" title="Aide formateur (A)">?</button>
      <button class="ctrl-btn" id="prevBtn" title="Slide precedente">&#9664;</button>
      <span class="counter"><span id="currentSlide">1</span>/<span id="totalSlides">1</span></span>
      <button class="ctrl-btn" id="nextBtn" title="Slide suivante">&#9654;</button>
      <button class="ctrl-btn" id="notesBtn" title="Notes orateur (N)">N</button>
      <button class="ctrl-btn" id="fullscreenBtn" title="Plein ecran (F)">F</button>
      <button class="ctrl-btn" id="menuBtn" title="Menu">&#9776;</button>
    </div>
  </header>

  <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
  <main class="slides-wrapper" id="slidesWrapper"></main>
  <aside class="speaker-notes" id="speakerNotes">
    <h4>Notes orateur</h4>
    <div id="notesContent">Aucune note.</div>
  </aside>
  <aside class="tp-panel" id="tpPanel">
    <div class="panel-head">
      <h3 id="tpTitle">Exercice</h3>
      <button class="ctrl-btn" id="tpClose">x</button>
    </div>
    <div class="panel-body" id="tpContent"></div>
  </aside>
  <aside class="assist-panel" id="assistPanel">
    <h3>Raccourcis</h3>
    <p><span class="key">&#8592;</span><span class="key">&#8594;</span> naviguer</p>
    <p><span class="key">1</span><span class="key">2</span><span class="key">3</span> changer de jour</p>
    <p><span class="key">T</span> exercice lie a la slide</p>
    <p><span class="key">N</span> notes orateur</p>
    <p><span class="key">F</span> plein ecran</p>
    <p><span class="key">M</span> menu des slides</p>
  </aside>
  <nav class="menu" id="slideMenu"></nav>
  <div class="keyboard-hints">
    <span><span class="key">&#8592;/&#8594;</span> naviguer</span>
    <span><span class="key">T</span> TP</span>
    <span><span class="key">N</span> notes</span>
    <span><span class="key">M</span> menu</span>
  </div>

  <script>
    const decks = [
      { day: "1", label: "J1 - Installer & comprendre", file: "../lessons/jour-1.md" },
      { day: "2", label: "J2 - Terminal productif", file: "../lessons/jour-2.md" },
      { day: "3", label: "J3 - Systeme & diagnostic", file: "../lessons/jour-3.md" }
    ];

    const state = {
      slides: [],
      current: 0,
      currentDay: "1",
      notesVisible: false,
      tpVisible: false,
      assistVisible: false,
      menuVisible: false
    };

    const els = {
      dayNav: document.getElementById("dayNav"),
      wrapper: document.getElementById("slidesWrapper"),
      current: document.getElementById("currentSlide"),
      total: document.getElementById("totalSlides"),
      progress: document.getElementById("progressBar"),
      notes: document.getElementById("speakerNotes"),
      notesContent: document.getElementById("notesContent"),
      tpBtn: document.getElementById("tpBtn"),
      tpPanel: document.getElementById("tpPanel"),
      tpTitle: document.getElementById("tpTitle"),
      tpContent: document.getElementById("tpContent"),
      assistPanel: document.getElementById("assistPanel"),
      menu: document.getElementById("slideMenu")
    };

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function inlineMarkdown(value) {
      return value
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img class="slide-img" src="$2" alt="$1" loading="lazy">')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
    }

    function parseTable(lines, index) {
      const tableLines = [];
      while (index < lines.length && lines[index].trim().startsWith("|")) {
        tableLines.push(lines[index].trim());
        index++;
      }
      if (tableLines.length < 2) return { html: "", next: index };
      const rows = tableLines.filter((line, i) => i !== 1).map(line =>
        line.replace(/^\||\|$/g, "").split("|").map(cell => inlineMarkdown(cell.trim()))
      );
      const head = rows.shift() || [];
      let html = "<table><thead><tr>" + head.map(cell => `<th>${cell}</th>`).join("") + "</tr></thead><tbody>";
      html += rows.map(row => "<tr>" + row.map(cell => `<td>${cell}</td>`).join("") + "</tr>").join("");
      html += "</tbody></table>";
      return { html, next: index };
    }

    function markdownToHtml(source) {
      const codeBlocks = [];
      let md = source.replace(/```([a-zA-Z0-9_-]*)\n([\s\S]*?)```/g, (_, lang, code) => {
        const token = `@@CODE_${codeBlocks.length}@@`;
        const cls = lang ? ` class="language-${lang}"` : "";
        codeBlocks.push(`<pre><code${cls}>${escapeHtml(code.trim())}</code></pre>`);
        return token;
      });

      const lines = md.split("\n");
      const out = [];
      let i = 0;
      while (i < lines.length) {
        const raw = lines[i];
        const line = raw.trim();
        if (!line) { i++; continue; }
        if (line.startsWith("@@CODE_")) { out.push(codeBlocks[Number(line.match(/\d+/)[0])]); i++; continue; }
        if (line.startsWith("|")) {
          const table = parseTable(lines, i);
          out.push(table.html);
          i = table.next;
          continue;
        }
        if (line.startsWith("# ")) { out.push(`<h1 class="slide-title accent">${inlineMarkdown(line.slice(2))}</h1>`); i++; continue; }
        if (line.startsWith("## ")) { out.push(`<h2 class="slide-title">${inlineMarkdown(line.slice(3))}</h2>`); i++; continue; }
        if (line.startsWith("### ")) { out.push(`<h3>${inlineMarkdown(line.slice(4))}</h3>`); i++; continue; }
        if (line.startsWith("#### ")) { out.push(`<h4>${inlineMarkdown(line.slice(5))}</h4>`); i++; continue; }
        if (line.startsWith("- ")) {
          const items = [];
          while (i < lines.length && lines[i].trim().startsWith("- ")) {
            items.push(`<li>${inlineMarkdown(lines[i].trim().slice(2))}</li>`);
            i++;
          }
          out.push(`<ul>${items.join("")}</ul>`);
          continue;
        }
        if (/^\d+\.\s/.test(line)) {
          const items = [];
          while (i < lines.length && /^\d+\.\s/.test(lines[i].trim())) {
            items.push(`<li>${inlineMarkdown(lines[i].trim().replace(/^\d+\.\s/, ""))}</li>`);
            i++;
          }
          out.push(`<ol>${items.join("")}</ol>`);
          continue;
        }
        if (line.startsWith("> ")) {
          out.push(`<div class="info-box">${inlineMarkdown(line.slice(2))}</div>`);
          i++;
          continue;
        }
        if (line.startsWith("<")) {
          out.push(raw);
          i++;
          continue;
        }
        out.push(`<p class="slide-subtitle">${inlineMarkdown(line)}</p>`);
        i++;
      }
      return out.join("\n");
    }

    function parseSlide(markdown, deck, number) {
      const noteSplit = markdown.split(/\nNote:\s*/);
      let content = noteSplit[0].trim();
      const note = noteSplit.slice(1).join("\nNote: ").trim();
      const exerciseMatch = content.match(/<!--\s*exercise:\s*([^>]+?)\s*-->/);
      const classMatch = content.match(/<!--\s*class:\s*([^>]+?)\s*-->/);
      const exercise = exerciseMatch ? exerciseMatch[1].trim() : "";
      const extraClass = classMatch ? classMatch[1].trim() : "";
      content = content.replace(/<!--\s*(exercise|class):\s*[^>]+?\s*-->/g, "").trim();
      const titleMatch = content.match(/^#{1,2}\s+(.+)$/m);
      return {
        day: deck.day,
        dayLabel: deck.label,
        id: `J${deck.day}.${String(number).padStart(2, "0")}`,
        html: markdownToHtml(content),
        note,
        exercise,
        extraClass,
        title: titleMatch ? titleMatch[1].replace(/`/g, "") : `Slide ${number}`
      };
    }

    async function loadDecks() {
      for (const deck of decks) {
        const response = await fetch(`${deck.file}?v=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`Impossible de charger ${deck.file}`);
        const text = await response.text();
        const parts = text.split(/\n---+\n/g).map(part => part.trim()).filter(Boolean);
        parts.forEach((part, index) => state.slides.push(parseSlide(part, deck, index)));
      }
    }

    function render() {
      els.wrapper.innerHTML = state.slides.map((slide, index) => `
        <section class="slide ${slide.extraClass}" data-index="${index}" data-day="${slide.day}">
          <div class="slide-inner">
            <div class="slide-number">${slide.id}</div>
            ${slide.html}
          </div>
        </section>
      `).join("");

      els.dayNav.innerHTML = decks.map(deck => `
        <button class="day-btn" data-day="${deck.day}">${deck.label}</button>
      `).join("");

      els.menu.innerHTML = state.slides.map((slide, index) => `
        <button class="menu-item" data-index="${index}">
          <span class="menu-num">${slide.id}</span>
          <span>${slide.title}</span>
        </button>
      `).join("");

      document.querySelectorAll(".day-btn").forEach(btn => {
        btn.addEventListener("click", () => goToDay(btn.dataset.day));
      });
      document.querySelectorAll(".menu-item").forEach(item => {
        item.addEventListener("click", () => {
          goTo(Number(item.dataset.index));
          toggleMenu(false);
        });
      });
    }

    function highlightAll() {
      if (typeof window.hljs === "undefined") return;
      document.querySelectorAll("pre code:not(.hljs)").forEach(el => {
        try { window.hljs.highlightElement(el); } catch (_) {}
      });
    }

    function update() {
      const slides = [...document.querySelectorAll(".slide")];
      slides.forEach((el, index) => {
        el.classList.toggle("active", index === state.current);
        el.classList.toggle("prev", index < state.current);
      });
      highlightAll();
      const current = state.slides[state.current];
      state.currentDay = current.day;
      els.current.textContent = String(state.current + 1);
      els.total.textContent = String(state.slides.length);
      els.progress.style.width = `${((state.current + 1) / state.slides.length) * 100}%`;
      els.notesContent.innerHTML = current.note ? markdownToHtml(current.note) : "<p>Aucune note.</p>";
      els.tpBtn.disabled = !current.exercise;
      document.querySelectorAll(".day-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.day === current.day));
      document.querySelectorAll(".menu-item").forEach(item => item.classList.toggle("active", Number(item.dataset.index) === state.current));
      document.getElementById("prevBtn").disabled = state.current === 0;
      document.getElementById("nextBtn").disabled = state.current === state.slides.length - 1;
      if (!current.exercise && state.tpVisible) toggleTp(false);
    }

    function goTo(index) {
      state.current = Math.max(0, Math.min(index, state.slides.length - 1));
      update();
    }

    function goToDay(day) {
      const index = state.slides.findIndex(slide => slide.day === day);
      if (index >= 0) goTo(index);
    }

    function next() { goTo(state.current + 1); }
    function prev() { goTo(state.current - 1); }

    function toggleNotes(force) {
      state.notesVisible = typeof force === "boolean" ? force : !state.notesVisible;
      els.notes.classList.toggle("visible", state.notesVisible);
      document.getElementById("notesBtn").classList.toggle("active", state.notesVisible);
      if (state.notesVisible) highlightAll();
    }

    async function toggleTp(force) {
      state.tpVisible = typeof force === "boolean" ? force : !state.tpVisible;
      const current = state.slides[state.current];
      if (state.tpVisible && current.exercise) {
        els.tpTitle.textContent = current.exercise.split("/").pop();
        els.tpContent.innerHTML = "<p>Chargement...</p>";
        const response = await fetch(`${current.exercise}?v=${Date.now()}`, { cache: "no-store" });
        els.tpContent.innerHTML = response.ok ? markdownToHtml(await response.text()) : "<p>Exercice introuvable.</p>";
        highlightAll();
      }
      els.tpPanel.classList.toggle("visible", state.tpVisible);
      els.tpBtn.classList.toggle("active", state.tpVisible);
    }

    function toggleAssist(force) {
      state.assistVisible = typeof force === "boolean" ? force : !state.assistVisible;
      els.assistPanel.classList.toggle("visible", state.assistVisible);
      document.getElementById("assistBtn").classList.toggle("active", state.assistVisible);
    }

    function toggleMenu(force) {
      state.menuVisible = typeof force === "boolean" ? force : !state.menuVisible;
      els.menu.classList.toggle("visible", state.menuVisible);
      document.getElementById("menuBtn").classList.toggle("active", state.menuVisible);
    }

    document.getElementById("prevBtn").addEventListener("click", prev);
    document.getElementById("nextBtn").addEventListener("click", next);
    document.getElementById("notesBtn").addEventListener("click", () => toggleNotes());
    document.getElementById("tpBtn").addEventListener("click", () => toggleTp());
    document.getElementById("tpClose").addEventListener("click", () => toggleTp(false));
    document.getElementById("assistBtn").addEventListener("click", () => toggleAssist());
    document.getElementById("menuBtn").addEventListener("click", () => toggleMenu());
    document.getElementById("fullscreenBtn").addEventListener("click", () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    });

    document.addEventListener("keydown", event => {
      if (event.target.tagName === "INPUT" || event.target.tagName === "TEXTAREA") return;
      if (event.key === "ArrowRight" || event.key === " ") next();
      if (event.key === "ArrowLeft") prev();
      if (event.key === "n" || event.key === "N") toggleNotes();
      if (event.key === "t" || event.key === "T") toggleTp();
      if (event.key === "a" || event.key === "A" || event.key === "?") toggleAssist();
      if (event.key === "m" || event.key === "M") toggleMenu();
      if (event.key === "f" || event.key === "F") document.getElementById("fullscreenBtn").click();
      if (["1", "2", "3"].includes(event.key)) goToDay(event.key);
    });

    loadDecks()
      .then(() => { render(); update(); })
      .catch(error => {
        els.wrapper.innerHTML = `<section class="slide active"><div class="slide-inner"><h1 class="slide-title accent">Erreur</h1><p>${error.message}</p></div></section>`;
      });
  </script>
</body>
</html>
